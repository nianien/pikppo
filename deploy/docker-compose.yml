version: "3.8"

services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    ports:
      - "8765:8765"
    volumes:
      - db-data:/data/db
      - web-data:/data/web
    env_file:
      - ../.env
    environment:
      - DB_DIR=/data/db
      - WEB_DATA_DIR=/data/web
    restart: unless-stopped

  pipeline:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.pipeline
    volumes:
      - pipeline-data:/data
    env_file:
      - ../.env
    environment:
      - PIPELINE_DATA_DIR=/data
      - API_URL=http://web:8765
    command: ["vsd-pipeline", "worker", "--api-url", "http://web:8765"]
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy

volumes:
  db-data:
  web-data:
  pipeline-data:
