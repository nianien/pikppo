name: pikppo
description: "Private Butler - 私人AI助理"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^15.1.2
  shared_preferences: ^2.5.3
  dio: ^5.8.0+1
  uuid: ^4.5.1
  mcp_client: ^2.0.0
  flutter_secure_storage: ^9.2.2
  geolocator: ^14.0.0
  geocoding: ^4.0.0
  # 本地持久化：drift + SQLCipher 加密。messages/memories/groups 等高频写入的
  # 数据走 SQL（增量、不再全量 JSON 重写），key 由 flutter_secure_storage 托管。
  drift: ^2.21.0
  sqlcipher_flutter_libs: ^0.6.4
  path_provider: ^2.1.5
  path: ^1.9.0
  # 提醒：聊天消息 + 系统通知双轨。zonedSchedule 把日程提前注册到 OS
  # AlarmManager / UNUserNotificationCenter，App 被杀也能弹。
  flutter_local_notifications: ^18.0.1
  # zonedSchedule 需要时区数据库（Android / iOS 都用）。
  timezone: ^0.10.0
  flutter_timezone: ^4.0.0
  # 预置角色配置以 yaml 形态落在 assets/roles/，启动一次性加载
  # （见 lib/data/role_loader.dart）；运行时数据量小，常驻内存。
  yaml: ^3.1.2
  speech_to_text: ^7.4.0
  image_picker: ^1.2.2
  file_picker: ^11.0.2
  open_filex: ^4.7.0
  # 汇率走势折线图（纯 Dart，无原生依赖）
  fl_chart: ^1.2.0
  share_plus: ^12.0.2
  flutter_tts: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.21.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    # 预置角色 prompt 配置目录——加新预置角色就往这里丢 yaml。
    # 文件名与 id 必须保持一致（role_loader.dart 按目录列举）。
    - assets/roles/work.yaml
    - assets/roles/life.yaml
    - assets/roles/finance.yaml
    - assets/roles/health.yaml
